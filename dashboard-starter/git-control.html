<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athena | Git Control</title>
  <style>
    :root {
      --bg: #0c0f1a;
      --surface: #111827;
      --elevated: #1f2937;
      --border: #374151;
      --text: #f9fafb;
      --muted: #9ca3af;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #8b5cf6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .title svg { width: 24px; height: 24px; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-badge.clean {
      background: rgba(16, 185, 129, 0.15);
      color: var(--green);
    }

    .status-badge.dirty {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
    }

    .card-label {
      font-size: 0.625rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .card-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .card-value.branch {
      font-size: 1rem;
      color: var(--purple);
    }

    .card-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .changes-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .file-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.5rem;
      border-radius: 0.375rem;
      font-size: 0.8125rem;
      font-family: 'SF Mono', Monaco, monospace;
    }

    .file-item:hover {
      background: var(--elevated);
    }

    .file-status {
      font-size: 0.625rem;
      font-weight: 700;
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
      min-width: 1.5rem;
      text-align: center;
    }

    .file-status.M { background: var(--green); color: #000; }
    .file-status.A { background: var(--blue); color: #fff; }
    .file-status.D { background: var(--red); color: #fff; }
    .file-status.R { background: var(--purple); color: #fff; }
    .file-status.?? { background: var(--muted); color: #000; }

    .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .commits-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .commit-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .commit-item:last-child { border-bottom: none; }

    .commit-hash {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.75rem;
      color: var(--blue);
      background: var(--elevated);
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
    }

    .commit-msg {
      font-size: 0.8125rem;
      flex: 1;
    }

    .commit-time {
      font-size: 0.625rem;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
    }

    .btn-primary:hover { background: #2563eb; }

    .btn-secondary {
      background: var(--elevated);
      color: var(--text);
    }

    .btn-secondary:hover { background: var(--border); }

    .btn-success {
      background: var(--green);
      color: #000;
    }

    .btn-success:hover { background: #059669; }

    .footer {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 0.8125rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      Git Control
    </div>
    <div class="status-badge" id="repo-status">
      <span>●</span>
      <span>Checking...</span>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">Current Branch</div>
      <div class="card-value branch" id="branch">-</div>
    </div>
    <div class="card">
      <div class="card-label">Changed Files</div>
      <div class="card-value" id="changed">-</div>
      <div class="card-sub" id="changed-detail"></div>
    </div>
    <div class="card">
      <div class="card-label">Total Commits</div>
      <div class="card-value" id="commits">-</div>
    </div>
    <div class="card">
      <div class="card-label">Tracked Files</div>
      <div class="card-value" id="files">-</div>
      <div class="card-sub" id="branches"></div>
    </div>
  </div>

  <div class="changes-section">
    <div class="section-title">
      📁 Changed Files
      <span style="margin-left: auto; font-weight: normal; color: var(--muted);" id="files-count"></span>
    </div>
    <div class="file-list" id="file-list">
      <div style="color: var(--muted); font-size: 0.8125rem;">Loading...</div>
    </div>
  </div>

  <div class="commits-section">
    <div class="section-title">📜 Recent Commits</div>
    <div id="commits-list">
      <div style="color: var(--muted); font-size: 0.8125rem;">Loading...</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" onclick="refresh()">
      ↻ Refresh
    </button>
    <button class="btn btn-primary" onclick="showLog()">
      📜 View Log
    </button>
    <button class="btn btn-secondary" onclick="showBranches()">
      🌿 Branches
    </button>
  </div>

  <div class="footer">
    <span id="last-updated">Last updated: --</span>
    <button class="btn btn-success" onclick="quickCommit()" id="commit-btn" style="display: none;">
      ✓ Quick Commit All
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = 'api/git.js';

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function fetchGit(endpoint) {
      try {
        const res = await fetch(`${API_BASE}?action=${endpoint}`);
        return await res.json();
      } catch (e) {
        console.error(e);
        return { error: e.message };
      }
    }

    async function refresh() {
      document.getElementById('last-updated').textContent = 'Loading...';
      
      const [status, stats, log] = await Promise.all([
        fetchGit('status'),
        fetchGit('stats'),
        fetchGit('log')
      ]);

      // Branch
      document.getElementById('branch').textContent = status.branch || 'main';

      // Status badge
      const badge = document.getElementById('repo-status');
      if (status.clean) {
        badge.className = 'status-badge clean';
        badge.innerHTML = '<span>✓</span><span>Clean</span>';
        document.getElementById('commit-btn').style.display = 'none';
      } else {
        badge.className = 'status-badge dirty';
        badge.innerHTML = '<span>●</span><span>Modified</span>';
        document.getElementById('commit-btn').style.display = 'flex';
      }

      // Changed files
      const changedCount = status.files ? status.files.length : 0;
      document.getElementById('changed').textContent = changedCount;
      document.getElementById('changed-detail').textContent = changedCount === 0 ? 'All clean' : `${changedCount} uncommitted`;

      // Stats
      document.getElementById('commits').textContent = stats.totalCommits || '0';
      document.getElementById('files').textContent = stats.trackedFiles || '0';
      document.getElementById('branches').textContent = `${stats.branches} branches`;

      // File list
      const fileList = document.getElementById('file-list');
      const filesCount = document.getElementById('files-count');
      if (status.files && status.files.length > 0) {
        filesCount.textContent = `${status.files.length} files`;
        fileList.innerHTML = status.files.slice(0, 20).map(f => `
          <div class="file-item">
            <span class="file-status">${f.status || '??'}</span>
            <span class="file-name">${f.file}</span>
          </div>
        `).join('');
        if (status.files.length > 20) {
          fileList.innerHTML += `<div class="file-item" style="color: var(--muted);">... and ${status.files.length - 20} more</div>`;
        }
      } else {
        filesCount.textContent = '0 files';
        fileList.innerHTML = '<div class="file-item" style="color: var(--green);">✓ Working tree clean</div>';
      }

      // Commits
      const commitsList = document.getElementById('commits-list');
      if (log.commits && log.commits.length > 0) {
        commitsList.innerHTML = log.commits.slice(0, 5).map(c => `
          <div class="commit-item">
            <span class="commit-hash">${c.hash.substring(0, 7)}</span>
            <div>
              <div class="commit-msg">${c.message}</div>
            </div>
          </div>
        `).join('');
      } else {
        commitsList.innerHTML = '<div class="commit-item" style="color: var(--muted);">No commits found</div>';
      }

      document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
    }

    async function showLog() {
      const log = await fetchGit('log');
      if (log.commits) {
        const msg = log.commits.slice(0, 10).map(c => `${c.hash.substring(0,7)}: ${c.message}`).join('\n');
        alert('Recent Commits:\n\n' + msg);
      }
    }

    async function showBranches() {
      const branches = await fetchGit('branches');
      if (branches.branches) {
        const list = branches.branches.map(b => (b.current ? '* ' : '  ') + b.name).join('\n');
        alert('Branches:\n\n' + list);
      }
    }

    async function quickCommit() {
      const status = await fetchGit('status');
      if (!status.files || status.files.length === 0) {
        showToast('Nothing to commit', 'error');
        return;
      }

      const msg = prompt('Commit message:', `Update at ${new Date().toISOString().slice(0,16)}`);
      if (!msg) return;

      showToast('Committing...', 'success');
      
      try {
        const res = await fetch('api/git.js', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command: `git add -A && git commit -m "${msg.replace(/"/g, '\\"')}"` })
        });
        const result = await res.json();
        
        if (result.error) {
          showToast('Error: ' + result.error, 'error');
        } else {
          showToast('Committed successfully!', 'success');
          refresh();
        }
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>

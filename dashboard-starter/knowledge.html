<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena Knowledge Base | Cross-Agent Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f1f5f9; 
            min-height: 100vh;
        }
        .card { 
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2); 
            border-radius: 1rem; 
            padding: 1.5rem;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(51, 65, 85, 0.9) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
        }
        .glow-text { text-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
        code { font-family: 'Fira Code', monospace; }
        .confidence-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(99, 102, 241, 0.2);
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 3px;
        }
        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        .domain-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .domain-bidding { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .domain-research { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .domain-communication { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .domain-development { background: rgba(6, 182, 212, 0.2); color: #22d3ee; }
        .domain-maintenance { background: rgba(244, 63, 94, 0.2); color: #fb7185; }
        .insight-card {
            background: rgba(30, 41, 59, 0.6);
            border-left: 3px solid #6366f1;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0 0.5rem 0.5rem 0;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8">
            <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                <div>
                    <h1 class="text-3xl font-bold glow-text flex items-center gap-3">
                        🧠 Knowledge Base
                    </h1>
                    <p class="text-slate-400 mt-1">Cross-agent learning & knowledge sharing</p>
                </div>
                <div class="flex gap-3">
                    <button id="refresh-btn" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-medium transition flex items-center gap-2">
                        🔄 Refresh
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card">
                <p class="text-slate-400 text-sm">Total Experiences</p>
                <p class="text-2xl font-bold mt-1" id="stat-experiences">--</p>
            </div>
            <div class="stat-card">
                <p class="text-slate-400 text-sm">Patterns Learned</p>
                <p class="text-2xl font-bold mt-1 text-purple-400" id="stat-patterns">--</p>
            </div>
            <div class="stat-card">
                <p class="text-slate-400 text-sm">Domains</p>
                <p class="text-2xl font-bold mt-1 text-cyan-400" id="stat-domains">--</p>
            </div>
            <div class="stat-card">
                <p class="text-slate-400 text-sm">Shared Insights</p>
                <p class="text-2xl font-bold mt-1 text-green-400" id="stat-insights">--</p>
            </div>
        </div>

        <!-- Agent Performance -->
        <div class="card mb-8">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <span class="text-indigo-400">🤖</span> Agent Learning Stats
            </h2>
            <div id="agent-stats" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Domain Knowledge -->
        <div class="card mb-8">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <span class="text-purple-400">📚</span> Domain Knowledge
            </h2>
            <div id="domain-knowledge" class="space-y-4">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Shared Insights -->
        <div class="card mb-8">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <span class="text-green-400">💡</span> Shared Insights
            </h2>
            <div id="shared-insights">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Recent Experiences -->
        <div class="card">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <span class="text-amber-400">📜</span> Recent Experiences
            </h2>
            <div id="recent-experiences" class="space-y-3">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-8 text-center text-slate-500 text-xs font-mono">
            <p>Cross-Agent Learning System • Knowledge shared is knowledge multiplied</p>
        </footer>
    </div>

    <script>
        let knowledgeData = null;

        // Agent configurations
        const AGENTS = {
            athena: { name: 'Athena', avatar: '🏛️', domains: ['coordination', 'maintenance'] },
            sterling: { name: 'Sterling', avatar: '🐝', domains: ['bidding', 'finance'] },
            ishtar: { name: 'Ishtar', avatar: '🔮', domains: ['research', 'development'] },
            felicity: { name: 'Felicity', avatar: '💌', domains: ['communication'] },
            prometheus: { name: 'Prometheus', avatar: '🔥', domains: ['development', 'research'] },
            squire: { name: 'Squire', avatar: '🛡️', domains: ['maintenance'] },
            delver: { name: 'Delver', avatar: '⛏️', domains: ['research'] },
            cisco: { name: 'Cisco', avatar: '🌐', domains: ['maintenance', 'coordination'] },
            themis: { name: 'THEMIS', avatar: '⚖️', domains: ['coordination', 'research'] }
        };

        const DOMAIN_ICONS = {
            bidding: '🐝',
            research: '🔬',
            communication: '📧',
            development: '💻',
            maintenance: '🔧',
            coordination: '🎯',
            finance: '💰'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            document.getElementById('refresh-btn').addEventListener('click', loadData);
        });

        async function loadData() {
            try {
                const res = await fetch('/api/knowledge-base.json?t=' + Date.now());
                knowledgeData = await res.json();
                updateUI();
            } catch (error) {
                console.error('Failed to load knowledge:', error);
                showEmptyState();
            }
        }

        function updateUI() {
            if (!knowledgeData) return;

            // Calculate stats
            const experiences = knowledgeData.experiences || [];
            const byAgent = knowledgeData.learnings?.by_agent || {};
            const domains = knowledgeData.domains || {};
            const sharedInsights = knowledgeData.learnings?.shared || [];

            // Count patterns
            let totalPatterns = 0;
            Object.values(domains).forEach(d => {
                totalPatterns += (d.patterns || []).length;
            });

            // Update stats
            document.getElementById('stat-experiences').textContent = experiences.length;
            document.getElementById('stat-patterns').textContent = totalPatterns;
            document.getElementById('stat-domains').textContent = Object.keys(domains).length;
            document.getElementById('stat-insights').textContent = sharedInsights.length;

            // Agent stats
            const agentStatsHtml = Object.entries(byAgent).map(([agentId, stats]) => {
                const agent = AGENTS[agentId] || { name: agentId, avatar: '🤖' };
                const successRate = (stats.success_rate * 100).toFixed(0);
                
                return `
                    <div class="bg-slate-800/50 rounded-lg p-4">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="agent-avatar bg-slate-700">${agent.avatar}</div>
                            <div>
                                <p class="font-medium">${agent.name}</p>
                                <p class="text-xs text-slate-400">${stats.total_tasks || 0} tasks</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-400">Success Rate</span>
                            <span class="font-mono ${successRate >= 90 ? 'text-green-400' : successRate >= 70 ? 'text-amber-400' : 'text-red-400'}">${successRate}%</span>
                        </div>
                        <div class="confidence-bar mt-2">
                            <div class="confidence-fill" style="width: ${successRate}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('agent-stats').innerHTML = agentStatsHtml || 
                '<p class="text-slate-500 col-span-3 text-center py-4">No agent stats yet</p>';

            // Domain knowledge
            const domainHtml = Object.entries(domains).map(([domain, data]) => {
                const patterns = data.patterns || [];
                const failures = data.failure_modes || [];
                const icon = DOMAIN_ICONS[domain] || '📁';

                return `
                    <div class="bg-slate-800/30 rounded-lg p-4">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-xl">${icon}</span>
                            <h3 class="font-semibold capitalize">${domain}</h3>
                            <span class="domain-tag domain-${domain}">${patterns.length} patterns</span>
                        </div>
                        ${patterns.length > 0 ? `
                            <ul class="space-y-2 text-sm">
                                ${patterns.slice(0, 3).map(p => `
                                    <li class="flex items-start gap-2">
                                        <span class="text-indigo-400 mt-1">•</span>
                                        <div>
                                            <p>${p.pattern}</p>
                                            <div class="flex items-center gap-2 mt-1">
                                                <div class="confidence-bar w-16">
                                                    <div class="confidence-fill" style="width: ${p.confidence * 100}%"></div>
                                                </div>
                                                <span class="text-xs text-slate-500">${(p.confidence * 100).toFixed(0)}%</span>
                                            </div>
                                        </div>
                                    </li>
                                `).join('')}
                            </ul>
                        ` : '<p class="text-slate-500 text-sm">No patterns learned yet</p>'}
                    </div>
                `;
            }).join('');

            document.getElementById('domain-knowledge').innerHTML = domainHtml || 
                '<p class="text-slate-500 text-center py-4">No domain knowledge yet</p>';

            // Shared insights
            const insightsHtml = sharedInsights.slice(0, 5).map(insight => `
                <div class="insight-card">
                    <div class="flex items-start gap-3">
                        <span class="text-xl">${DOMAIN_ICONS[insight.domain] || '💡'}</span>
                        <div>
                            <p class="font-medium">${insight.pattern}</p>
                            <div class="flex items-center gap-3 mt-2 text-sm">
                                <span class="text-slate-400">Confidence: <span class="text-green-400">${(insight.confidence * 100).toFixed(0)}%</span></span>
                                <span class="text-slate-400">Domain: <span class="capitalize">${insight.domain}</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('shared-insights').innerHTML = insightsHtml || 
                '<p class="text-slate-500 text-center py-4">No shared insights yet. Patterns will emerge as agents complete more tasks.</p>';

            // Recent experiences
            const recentHtml = experiences.slice(-10).reverse().map(exp => {
                const agent = AGENTS[exp.agent] || { name: exp.agent, avatar: '🤖' };
                const successClass = exp.success ? 'text-green-400' : 'text-red-400';
                const successIcon = exp.success ? '✅' : '❌';

                return `
                    <div class="flex items-center gap-4 bg-slate-800/30 rounded-lg p-3">
                        <div class="agent-avatar bg-slate-700 text-xl">${agent.avatar}</div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="font-medium">${agent.name}</span>
                                <span class="text-xs text-slate-500">${exp.task_type}</span>
                                <span class="domain-tag domain-${exp.domain}">${exp.domain}</span>
                            </div>
                            <div class="text-xs text-slate-400 mt-1">
                                ${exp.lessons_learned?.slice(0, 2).join(' • ') || 'No lessons recorded'}
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="${successClass}">${successIcon}</span>
                            <p class="text-xs text-slate-500 mt-1">${exp.duration_seconds?.toFixed(0)}s</p>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('recent-experiences').innerHTML = recentHtml || 
                '<p class="text-slate-500 text-center py-4">No experiences logged yet</p>';
        }

        function showEmptyState() {
            document.getElementById('stat-experiences').textContent = '0';
            document.getElementById('stat-patterns').textContent = '0';
            document.getElementById('stat-domains').textContent = '0';
            document.getElementById('stat-insights').textContent = '0';
            document.getElementById('agent-stats').innerHTML = '<p class="text-slate-500 col-span-3 text-center py-4">No data yet</p>';
            document.getElementById('domain-knowledge').innerHTML = '<p class="text-slate-500 text-center py-4">No domain knowledge yet</p>';
            document.getElementById('shared-insights').innerHTML = '<p class="text-slate-500 text-center py-4">No insights yet</p>';
            document.getElementById('recent-experiences').innerHTML = '<p class="text-slate-500 text-center py-4">No experiences yet</p>';
        }
    </script>
</body>
</html>

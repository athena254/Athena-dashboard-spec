<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athena | Quick Status</title>
  <style>
    :root {
      --bg: #0c0f1a;
      --surface: #111827;
      --elevated: #1f2937;
      --border: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --green: #10b981;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --purple: #8b5cf6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
      min-height: 100vh;
    }

    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      max-width: 400px;
      margin: 0 auto;
    }

    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .status-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.625rem;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 9999px;
      font-size: 0.625rem;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .metric {
      background: var(--elevated);
      border-radius: 0.5rem;
      padding: 0.75rem;
      text-align: center;
    }

    .metric-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .metric-label {
      font-size: 0.625rem;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .agent-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 0.375rem;
      margin-bottom: 0.25rem;
    }

    .agent-row:hover {
      background: var(--elevated);
    }

    .agent-avatar {
      font-size: 1rem;
    }

    .agent-name {
      flex: 1;
      font-size: 0.8125rem;
      font-weight: 500;
    }

    .agent-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .agent-status.active {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .agent-status.idle {
      background: var(--yellow);
    }

    .footer {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 0.625rem;
      color: var(--muted);
    }

    .refresh-btn {
      background: none;
      border: none;
      color: var(--blue);
      cursor: pointer;
      font-size: 0.625rem;
    }

    .refresh-btn:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="status-card">
    <div class="status-header">
      <div class="status-title">
        <span>🦉</span>
        <span>Athena Status</span>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span>Online</span>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric">
        <div class="metric-value" id="active-agents">-</div>
        <div class="metric-label">Active</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="pending-bids">-</div>
        <div class="metric-label">Bids</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="sessions">-</div>
        <div class="metric-label">Sessions</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="tasks">-</div>
        <div class="metric-label">Tasks</div>
      </div>
    </div>

    <div id="agent-list"></div>

    <div class="footer">
      <span id="last-updated">--</span>
      <button class="refresh-btn" onclick="refresh()">Refresh ↻</button>
    </div>
  </div>

  <script>
    async function refresh() {
      try {
        const res = await fetch('api/data.json');
        const data = await res.json();
        
        const active = data.agents.filter(a => a.status === 'active').length;
        document.getElementById('active-agents').textContent = active;
        document.getElementById('pending-bids').textContent = data.pendingBids;
        document.getElementById('sessions').textContent = data.metrics.activeSessions;
        document.getElementById('tasks').textContent = data.agents.reduce((s, a) => s + a.tasks, 0);
        
        const list = document.getElementById('agent-list');
        list.innerHTML = data.agents.slice(0, 6).map(a => `
          <div class="agent-row">
            <span class="agent-avatar">${a.avatar}</span>
            <span class="agent-name">${a.name}</span>
            <span class="agent-status ${a.status}"></span>
          </div>
        `).join('');
        
        document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
      } catch (e) {
        console.error(e);
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Performance Visualizer | Athena</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --bg-card-hover: #222230;
      --accent-cyan: #00f5d4;
      --accent-magenta: #f72585;
      --accent-violet: #7b2cbf;
      --accent-amber: #ffbe0b;
      --accent-blue: #3a86ff;
      --accent-green: #06d6a0;
      --text-primary: #ffffff;
      --text-secondary: #8888aa;
      --text-muted: #555566;
      --border-subtle: rgba(255,255,255,0.06);
      --glow-cyan: 0 0 30px rgba(0,245,212,0.3);
      --glow-magenta: 0 0 30px rgba(247,37,133,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(123,44,191,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0,245,212,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(247,37,133,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 30px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: var(--glow-cyan); }
      50% { box-shadow: var(--glow-magenta); }
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-stats {
      display: flex;
      gap: 40px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-cyan);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Grid Layout */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* Agent Card */
    .agent-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    .agent-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--agent-color, var(--accent-cyan));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .agent-card:hover {
      transform: translateY(-8px);
      background: var(--bg-card-hover);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .agent-card:hover::before {
      transform: scaleX(1);
    }

    .agent-card.active {
      border-color: var(--agent-color, var(--accent-cyan));
      box-shadow: 0 0 40px rgba(0,245,212,0.15);
    }

    .agent-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .agent-avatar {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      position: relative;
      background: linear-gradient(135deg, var(--agent-color), rgba(0,0,0,0.3));
    }

    .agent-avatar::after {
      content: '';
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--status-color, var(--accent-green));
      border: 3px solid var(--bg-card);
      animation: status-pulse 2s ease-in-out infinite;
    }

    @keyframes status-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.7; }
    }

    .agent-info h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .agent-role {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Metrics */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .metric {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .metric-value {
      font-size: 22px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-cyan);
      transition: all 0.3s ease;
    }

    .metric-value.high {
      color: var(--accent-green);
    }

    .metric-value.medium {
      color: var(--accent-amber);
    }

    .metric-value.low {
      color: var(--accent-magenta);
    }

    .metric-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* Activity Bar */
    .activity-bar {
      height: 6px;
      background: rgba(0,0,0,0.4);
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
    }

    .activity-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--agent-color), transparent);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .activity-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Status Indicator */
    .agent-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--status-color, var(--accent-green));
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Timeline Chart */
    .timeline-section {
      margin-top: 40px;
      background: var(--bg-card);
      border-radius: 20px;
      padding: 30px;
      border: 1px solid var(--border-subtle);
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .timeline-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .time-filters {
      display: flex;
      gap: 8px;
    }

    .time-filter {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: rgba(0,0,0,0.3);
      color: var(--text-secondary);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .time-filter.active {
      background: var(--accent-cyan);
      color: var(--bg-primary);
    }

    .chart-container {
      height: 200px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 20px 0;
    }

    .chart-bar {
      flex: 1;
      background: linear-gradient(180deg, var(--accent-cyan), var(--accent-violet));
      border-radius: 4px 4px 0 0;
      position: relative;
      transition: all 0.3s ease;
      min-height: 4px;
    }

    .chart-bar:hover {
      filter: brightness(1.3);
      transform: scaleY(1.05);
      transform-origin: bottom;
    }

    .chart-bar::before {
      content: attr(data-time);
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Real-time Feed */
    .feed-section {
      margin-top: 40px;
      background: var(--bg-card);
      border-radius: 20px;
      padding: 30px;
      border: 1px solid var(--border-subtle);
    }

    .feed-header h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .feed-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.2);
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .feed-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .feed-content {
      flex: 1;
    }

    .feed-agent {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .feed-message {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .feed-time {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .agents-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .agents-grid {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        gap: 20px;
      }

      .header-stats {
        width: 100%;
        justify-content: space-around;
      }
    }

    /* Floating particles */
    .particle {
      position: fixed;
      width: 4px;
      height: 4px;
      background: var(--accent-cyan);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.3;
      animation: float 10s infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.3;
      }
      90% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <h1>Agent Performance</h1>
      </div>
      <div class="header-stats">
        <div class="stat-item">
          <div class="stat-value" id="total-agents">9</div>
          <div class="stat-label">Active Agents</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="total-tasks">1,247</div>
          <div class="stat-label">Tasks Today</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="uptime">99.7%</div>
          <div class="stat-label">System Uptime</div>
        </div>
      </div>
    </header>

    <div class="agents-grid" id="agents-grid">
      <!-- Agent cards will be inserted here -->
    </div>

    <div class="timeline-section">
      <div class="timeline-header">
        <h2>📊 Activity Timeline</h2>
        <div class="time-filters">
          <button class="time-filter" data-hours="1">1H</button>
          <button class="time-filter active" data-hours="6">6H</button>
          <button class="time-filter" data-hours="24">24H</button>
          <button class="time-filter" data-hours="168">7D</button>
        </div>
      </div>
      <div class="chart-container" id="timeline-chart">
        <!-- Chart bars will be inserted here -->
      </div>
    </div>

    <div class="feed-section">
      <div class="feed-header">
        <h2>🚀 Live Activity Feed</h2>
      </div>
      <div class="feed-list" id="feed-list">
        <!-- Feed items will be inserted here -->
      </div>
    </div>
  </div>

  <script>
    // Agent data
    const agents = [
      { id: 'athena', name: 'Athena', role: 'Core Intelligence', emoji: '🧠', color: '#00f5d4', status: 'active', tasks: 156, efficiency: 98, latency: 12, uptime: 99.9 },
      { id: 'sterling', name: 'Sterling', role: 'Finance Lead', emoji: '💰', color: '#ffbe0b', status: 'active', tasks: 89, efficiency: 95, latency: 8, uptime: 99.8 },
      { id: 'ishtar', name: 'Ishtar', role: 'PAI Architecture', emoji: '🏛️', color: '#7b2cbf', status: 'idle', tasks: 34, efficiency: 92, latency: 15, uptime: 99.5 },
      { id: 'delver', name: 'Delver', role: 'Research', emoji: '🔍', color: '#3a86ff', status: 'active', tasks: 67, efficiency: 88, latency: 22, uptime: 99.2 },
      { id: 'squire', name: 'Squire', role: 'Task Execution', emoji: '⚔️', color: '#f72585', status: 'active', tasks: 203, efficiency: 96, latency: 5, uptime: 99.9 },
      { id: 'felicity', name: 'Felicity', role: 'Creative Studio', emoji: '🎨', color: '#ff6b6b', status: 'active', tasks: 45, efficiency: 91, latency: 18, uptime: 99.6 },
      { id: 'prometheus', name: 'Prometheus', role: 'Code Analysis', emoji: '🔥', color: '#06d6a0', status: 'active', tasks: 78, efficiency: 94, latency: 14, uptime: 99.7 },
      { id: 'cisco', name: 'Cisco', role: 'Network Ops', emoji: '🌐', color: '#48cae4', status: 'active', tasks: 112, efficiency: 97, latency: 6, uptime: 99.9 },
      { id: 'themis', name: 'THEMIS', role: 'Security Council', emoji: '⚖️', color: '#9d4edd', status: 'monitoring', tasks: 28, efficiency: 99, latency: 3, uptime: 100 }
    ];

    // Activity messages
    const activityMessages = [
      { agent: 'Athena', message: 'Processing new user request', icon: '💭' },
      { agent: 'Sterling', message: 'Analyzing market opportunities', icon: '📈' },
      { agent: 'Squire', message: 'Executing task #4821', icon: '⚡' },
      { agent: 'Delver', message: 'Researching API documentation', icon: '🔎' },
      { agent: 'Felicity', message: 'Generating creative assets', icon: '✨' },
      { agent: 'Prometheus', message: 'Reviewing code changes', icon: '🔍' },
      { agent: 'Cisco', message: 'Monitoring network health', icon: '📡' },
      { agent: 'THEMIS', message: 'Evaluating security posture', icon: '🛡️' },
      { agent: 'Ishtar', message: 'Optimizing PAI architecture', icon: '🏗️' }
    ];

    // Create floating particles
    function createParticles() {
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + 'vw';
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.animationDuration = (10 + Math.random() * 10) + 's';
        document.body.appendChild(particle);
      }
    }

    // Render agent cards
    function renderAgents() {
      const grid = document.getElementById('agents-grid');
      grid.innerHTML = agents.map(agent => {
        const efficiencyClass = agent.efficiency >= 95 ? 'high' : agent.efficiency >= 85 ? 'medium' : 'low';
        const statusColor = agent.status === 'active' ? '#06d6a0' : agent.status === 'idle' ? '#ffbe0b' : '#3a86ff';
        const statusText = agent.status === 'active' ? 'Active' : agent.status === 'idle' ? 'Idle' : 'Monitoring';
        
        return `
          <div class="agent-card active" style="--agent-color: ${agent.color}; --status-color: ${statusColor}">
            <div class="agent-header">
              <div class="agent-avatar">${agent.emoji}</div>
              <div class="agent-info">
                <h3>${agent.name}</h3>
                <div class="agent-role">${agent.role}</div>
              </div>
            </div>
            <div class="metrics-grid">
              <div class="metric">
                <div class="metric-value">${agent.tasks}</div>
                <div class="metric-label">Tasks</div>
              </div>
              <div class="metric">
                <div class="metric-value ${efficiencyClass}">${agent.efficiency}%</div>
                <div class="metric-label">Efficiency</div>
              </div>
              <div class="metric">
                <div class="metric-value">${agent.latency}ms</div>
                <div class="metric-label">Latency</div>
              </div>
              <div class="metric">
                <div class="metric-value">${agent.uptime}%</div>
                <div class="metric-label">Uptime</div>
              </div>
            </div>
            <div class="activity-bar">
              <div class="activity-fill" style="width: ${agent.efficiency}%"></div>
            </div>
            <div class="agent-status">
              <div class="status-dot"></div>
              <span class="status-text">${statusText}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Render timeline chart
    function renderTimeline(hours = 6) {
      const container = document.getElementById('timeline-chart');
      const bars = hours <= 1 ? 12 : hours <= 6 ? 12 : hours <= 24 ? 24 : 24;
      const now = new Date();
      
      let html = '';
      for (let i = bars - 1; i >= 0; i--) {
        const height = 20 + Math.random() * 80;
        const time = new Date(now.getTime() - (i * (hours * 60 * 60 * 1000) / bars));
        const timeStr = hours <= 6 ? time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : time.toLocaleTimeString([], { hour: '2-digit' });
        
        html += `<div class="chart-bar" style="height: ${height}%; --accent-cyan: ${agents[i % agents.length].color}" data-time="${timeStr}"></div>`;
      }
      container.innerHTML = html;
    }

    // Render feed
    function renderFeed() {
      const container = document.getElementById('feed-list');
      const shuffled = [...activityMessages].sort(() => Math.random() - 0.5);
      
      container.innerHTML = shuffled.map(item => {
        const agent = agents.find(a => a.name === item.agent);
        return `
          <div class="feed-item">
            <div class="feed-icon" style="background: linear-gradient(135deg, ${agent.color}, rgba(0,0,0,0.3))">${item.icon}</div>
            <div class="feed-content">
              <div class="feed-agent" style="color: ${agent.color}">${item.agent}</div>
              <div class="feed-message">${item.message}</div>
            </div>
            <div class="feed-time">${Math.floor(Math.random() * 59)}s ago</div>
          </div>
        `;
      }).join('');
    }

    // Update metrics
    function updateMetrics() {
      const totalTasks = document.getElementById('total-tasks');
      const current = parseInt(totalTasks.textContent.replace(',', ''));
      totalTasks.textContent = (current + Math.floor(Math.random() * 5)).toLocaleString();
      
      // Randomly update agent tasks
      agents.forEach(agent => {
        if (agent.status === 'active') {
          agent.tasks += Math.floor(Math.random() * 3);
        }
      });
      
      // Re-render agents periodically
      if (Math.random() > 0.7) {
        renderAgents();
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      renderAgents();
      renderTimeline();
      renderFeed();
      
      // Update metrics every 3 seconds
      setInterval(updateMetrics, 3000);
      
      // Update timeline every 30 seconds
      setInterval(() => renderTimeline(), 30000);
      
      // Add feed items periodically
      setInterval(() => {
        const container = document.getElementById('feed-list');
        const item = activityMessages[Math.floor(Math.random() * activityMessages.length)];
        const agent = agents.find(a => a.name === item.agent);
        
        const feedItem = document.createElement('div');
        feedItem.className = 'feed-item';
        feedItem.innerHTML = `
          <div class="feed-icon" style="background: linear-gradient(135deg, ${agent.color}, rgba(0,0,0,0.3))">${item.icon}</div>
          <div class="feed-content">
            <div class="feed-agent" style="color: ${agent.color}">${item.agent}</div>
            <div class="feed-message">${item.message}</div>
          </div>
          <div class="feed-time">just now</div>
        `;
        
        container.insertBefore(feedItem, container.firstChild);
        
        // Keep only last 10 items
        while (container.children.length > 10) {
          container.removeChild(container.lastChild);
        }
      }, 5000);
      
      // Time filter buttons
      document.querySelectorAll('.time-filter').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.time-filter').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderTimeline(parseInt(btn.dataset.hours));
        });
      });
    });
  </script>
</body>
</html>

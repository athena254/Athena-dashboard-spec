<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Pulse • Quick Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --accent-green: #00d4aa;
            --accent-yellow: #ffb800;
            --accent-red: #ff4757;
            --accent-blue: #5c7cfa;
            --accent-purple: #a855f7;
            --border: rgba(255,255,255,0.08);
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Monaco', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(92,124,250,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(168,85,247,0.06) 0%, transparent 50%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .timestamp {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .status-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.15);
        }

        .status-card .label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .status-card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .status-card .value.green { color: var(--accent-green); }
        .status-card .value.yellow { color: var(--accent-yellow); }
        .status-card .value.red { color: var(--accent-red); }
        .status-card .value.blue { color: var(--accent-blue); }

        .status-card .sub {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .refresh-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .agent-list {
            display: grid;
            gap: 8px;
        }

        .agent-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            transition: background 0.2s;
        }

        .agent-row:hover {
            background: rgba(255,255,255,0.05);
        }

        .agent-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .agent-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .agent-name {
            font-weight: 500;
            font-size: 13px;
        }

        .agent-role {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.active { background: var(--accent-green); }
        .status-dot.idle { background: var(--accent-yellow); }
        .status-dot.busy { background: var(--accent-blue); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .activity-list {
            display: grid;
            gap: 6px;
        }

        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            font-size: 12px;
        }

        .activity-time {
            color: var(--text-secondary);
            font-size: 10px;
            min-width: 50px;
        }

        .activity-text {
            color: var(--text-secondary);
        }

        .activity-text strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-primary);
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .action-btn .icon {
            font-size: 20px;
        }

        .action-btn .label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .health-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .health-bar {
            width: 60px;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: var(--accent-green);
            border-radius: 3px;
            transition: width 0.5s;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .error {
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
            color: var(--accent-red);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .status-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <h1>Athena Pulse</h1>
            </div>
            <div class="timestamp" id="timestamp">--</div>
        </header>

        <div id="error-container"></div>

        <div class="status-grid">
            <div class="status-card">
                <div class="label">Active Agents</div>
                <div class="value green" id="active-agents">--</div>
                <div class="sub" id="total-agents">/ 13 total</div>
            </div>
            <div class="status-card">
                <div class="label">Sessions Today</div>
                <div class="value blue" id="total-sessions">--</div>
                <div class="sub" id="session-sub">loading...</div>
            </div>
            <div class="status-card">
                <div class="label">Tokens Used</div>
                <div class="value yellow" id="total-tokens">--</div>
                <div class="sub" id="token-sub">calculating...</div>
            </div>
            <div class="status-card">
                <div class="label">Gateway</div>
                <div class="value green" id="gateway-status">●</div>
                <div class="sub" id="gateway-health">checking...</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-title">Agent Status</div>
                <button class="refresh-btn" onclick="fetchData()">↻ Refresh</button>
            </div>
            <div class="agent-list" id="agent-list">
                <div class="loading">Loading agent status...</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-title">Recent Activity</div>
            </div>
            <div class="activity-list" id="activity-list">
                <div class="loading">Loading activity...</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-title">Quick Actions</div>
            </div>
            <div class="quick-actions">
                <a href="index.html" class="action-btn">
                    <span class="icon">🏠</span>
                    <span class="label">Dashboard</span>
                </a>
                <a href="terminal.html" class="action-btn">
                    <span class="icon">⌨️</span>
                    <span class="label">Terminal</span>
                </a>
                <a href="gateway-monitor.html" class="action-btn">
                    <span class="icon">📡</span>
                    <span class="label">Sessions</span>
                </a>
                <a href="alert-center.html" class="action-btn">
                    <span class="icon">⚠️</span>
                    <span class="label">Alerts</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const AGENT_COLORS = {
            athena: '#a855f7',
            sterling: '#00d4aa',
            ishtar: '#5c7cfa',
            delver: '#ffb800',
            squire: '#ff6b9d',
            felicity: '#00d4aa',
            prometheus: '#ff6b9d',
            cisco: '#ff4757',
            themis: '#5c7cfa',
            apollo: '#ffb800',
            hermes: '#a855f7',
            kratos: '#00d4aa',
            chiron: '#ff4757'
        };

        const AGENT_NAMES = {
            athena: 'Athena',
            sterling: 'Sterling',
            ishtar: 'Ishtar',
            delver: 'Delver',
            squire: 'Squire',
            felicity: 'Felicity',
            prometheus: 'Prometheus',
            cisco: 'Cisco',
            themis: 'THEMIS',
            apollo: 'Apollo',
            hermes: 'Hermes',
            kratos: 'Kratos',
            chiron: 'Chiron'
        };

        const AGENT_ROLES = {
            athena: 'Orchestrator',
            sterling: 'Finance (Auto-Bidder)',
            ishtar: 'PAI Research',
            delver: 'Research',
            squire: 'Task Management',
            felicity: 'Code Artisan',
            prometheus: 'Executor',
            cisco: 'Communications',
            themis: 'Oversight',
            apollo: 'Prospecting',
            hermes: 'Client Relations',
            kratos: 'DeFi Trading',
            chiron: 'QA Testing'
        };

        async function fetchData() {
            try {
                const response = await fetch('api/live-status.json');
                if (!response.ok) throw new Error('Failed to fetch status');
                const data = await response.json();
                updateDashboard(data);
            } catch (err) {
                showError('Failed to load data: ' + err.message);
            }
        }

        function updateDashboard(data) {
            document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
            
            // Update status cards
            const sessions = data.sessions || {};
            const activeAgents = sessions.activeAgents || 0;
            const totalSessions = sessions.total || 0;
            const totalTokens = sessions.totalTokens || 0;

            document.getElementById('active-agents').textContent = activeAgents;
            document.getElementById('total-agents').textContent = '/ 13 total';
            document.getElementById('total-sessions').textContent = totalSessions;
            document.getElementById('session-sub').textContent = 'sessions';
            document.getElementById('total-tokens').textContent = formatNumber(totalTokens);
            document.getElementById('token-sub').textContent = 'tokens';

            // Gateway status
            const health = data.health || '';
            const isHealthy = health.toLowerCase().includes('running') || health.toLowerCase().includes('online');
            document.getElementById('gateway-status').textContent = isHealthy ? '●' : '○';
            document.getElementById('gateway-status').className = 'value ' + (isHealthy ? 'green' : 'red');
            document.getElementById('gateway-health').textContent = isHealthy ? 'Operational' : 'Issues';

            // Agent list
            renderAgentList(sessions.byAgent || []);

            // Recent activity
            renderActivity(sessions.byAgent || []);
        }

        function renderAgentList(agents) {
            const container = document.getElementById('agent-list');
            
            if (!agents || agents.length === 0) {
                container.innerHTML = '<div class="loading">No active sessions</div>';
                return;
            }

            const allAgents = Object.keys(AGENT_NAMES);
            const activeAgentIds = new Set(agents.filter(a => a.sessions > 0).map(a => a.agentId));

            let html = '';
            allAgents.forEach(id => {
                const agent = agents.find(a => a.agentId === id);
                const isActive = agent && agent.isActive;
                const hasSessions = activeAgentIds.has(id);
                const status = hasSessions ? (isActive ? 'active' : 'idle') : 'idle';
                
                html += `
                    <div class="agent-row">
                        <div class="agent-info">
                            <div class="agent-avatar" style="background: ${AGENT_COLORS[id]}20; color: ${AGENT_COLORS[id]}">
                                ${AGENT_NAMES[id][0]}
                            </div>
                            <div>
                                <div class="agent-name">${AGENT_NAMES[id]}</div>
                                <div class="agent-role">${AGENT_ROLES[id]}</div>
                            </div>
                        </div>
                        <div class="agent-status">
                            <div class="status-dot ${status}"></div>
                            <div class="status-text">${status}</div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderActivity(agents) {
            const container = document.getElementById('activity-list');
            
            const activities = [];
            agents.forEach(agent => {
                if (agent.sessions > 0) {
                    const ago = agent.latestAge ? formatAge(agent.latestAge) : 'just now';
                    activities.push({
                        agent: AGENT_NAMES[agent.agentId] || agent.agentId,
                        action: `Active with ${agent.sessions} session${agent.sessions > 1 ? 's' : ''}`,
                        time: ago
                    });
                }
            });

            if (activities.length === 0) {
                container.innerHTML = '<div class="activity-item"><div class="activity-text">No recent activity</div></div>';
                return;
            }

            let html = '';
            activities.slice(0, 5).forEach(act => {
                html += `
                    <div class="activity-item">
                        <div class="activity-time">${act.time}</div>
                        <div class="activity-text"><strong>${act.agent}</strong> ${act.action}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatAge(seconds) {
            if (seconds < 60) return seconds + 's ago';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            return Math.floor(seconds / 3600) + 'h ago';
        }

        function showError(msg) {
            document.getElementById('error-container').innerHTML = `<div class="error">${msg}</div>`;
        }

        // Initial load
        fetchData();
        
        // Auto-refresh every 30 seconds
        setInterval(fetchData, 30000);
    </script>
</body>
</html>

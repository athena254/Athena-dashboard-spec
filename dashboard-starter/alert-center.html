<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ Alert Center | Athena</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #16161f;
            --border: #2a2a3a;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.15);
            --danger-border: rgba(239, 68, 68, 0.3);
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.15);
            --warning-border: rgba(245, 158, 11, 0.3);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --success-border: rgba(16, 185, 129, 0.3);
            --info: #3b82f6;
            --info-bg: rgba(59, 130, 246, 0.15);
            --info-border: rgba(59, 130, 246, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 32px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
        }

        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.critical { background: var(--danger-bg); }
        .stat-icon.warning { background: var(--warning-bg); }
        .stat-icon.info { background: var(--info-bg); }
        .stat-icon.success { background: var(--success-bg); }

        .stat-info h3 {
            font-size: 28px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .alerts-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .alerts-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .count {
            background: var(--bg-tertiary);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .alert-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .alert-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .alert-card.critical::before { background: var(--danger); }
        .alert-card.warning::before { background: var(--warning); }
        .alert-card.info::before { background: var(--info); }
        .alert-card.success::before { background: var(--success); }

        .alert-card.critical { border-color: var(--danger-border); background: linear-gradient(135deg, var(--bg-card), var(--danger-bg)); }
        .alert-card.warning { border-color: var(--warning-border); background: linear-gradient(135deg, var(--bg-card), var(--warning-bg)); }
        .alert-card.info { border-color: var(--info-border); }
        .alert-card.success { border-color: var(--success-border); }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .alert-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 6px;
            font;
            text-transform-weight: 600: uppercase;
        }

        .alert-badge.critical { background: var(--danger); color: white; }
        .alert-badge.warning { background: var(--warning); color: black; }
        .alert-badge.info { background: var(--info); color: white; }
        .alert-badge.success { background: var(--success); color: white; }
        .alert-badge.resolved { background: var(--success); color: white; }

        .alert-description {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .alert-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .alert-time {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .alert-actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .refresh-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timeline {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .timeline-item {
            display: flex;
            gap: 16px;
            padding: 12px 0;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 36px;
            bottom: -12px;
            width: 2px;
            background: var(--border);
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            z-index: 1;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-weight: 600;
            font-size: 14px;
        }

        .timeline-time {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        @media (max-width: 1024px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .alerts-section {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo">⚠️</div>
                <div>
                    <h1>Alert Center</h1>
                    <p class="subtitle">System warnings, alerts, and action items</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="refresh-indicator">
                    <span class="refresh-dot"></span>
                    <span id="lastRefresh">Auto-refreshing...</span>
                </div>
                <button class="btn btn-secondary" onclick="refreshAlerts()">
                    🔄 Refresh
                </button>
                <button class="btn btn-primary" onclick="showAddAlert()">
                    ➕ Add Alert
                </button>
            </div>
        </header>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon critical">🔴</div>
                <div class="stat-info">
                    <h3 id="criticalCount">0</h3>
                    <p>Critical Issues</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon warning">🟡</div>
                <div class="stat-info">
                    <h3 id="warningCount">0</h3>
                    <p>Warnings</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon info">🔵</div>
                <div class="stat-info">
                    <h3 id="infoCount">0</h3>
                    <p>Info Messages</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon success">🟢</div>
                <div class="stat-info">
                    <h3 id="resolvedCount">0</h3>
                    <p>Resolved Today</p>
                </div>
            </div>
        </div>

        <div class="alerts-section">
            <div class="alerts-column">
                <h2 class="section-title">
                    🔴 Active Alerts
                    <span class="count" id="activeCount">0</span>
                </h2>
                <div id="activeAlerts">
                    <!-- Active alerts will be rendered here -->
                </div>
            </div>

            <div class="alerts-column">
                <h2 class="section-title">
                    📋 Action Items
                    <span class="count" id="actionCount">0</span>
                </h2>
                <div id="actionItems">
                    <!-- Action items will be rendered here -->
                </div>

                <h2 class="section-title" style="margin-top: 24px;">
                    ✅ Recent Resolutions
                    <span class="count" id="resolvedRecentCount">0</span>
                </h2>
                <div id="resolvedAlerts">
                    <!-- Resolved alerts will be rendered here -->
                </div>
            </div>
        </div>

        <div class="timeline">
            <h2 class="section-title">📜 Activity Timeline</h2>
            <div id="timeline">
                <!-- Timeline will be rendered here -->
            </div>
        </div>
    </div>

    <script>
        // Alert data - in production this would come from an API
        let alerts = [
            {
                id: 1,
                type: 'critical',
                title: 'THEMIS Bot - Invalid Telegram Token',
                description: 'Bot token returns 401 Unauthorized. THEMIS cannot connect to Telegram.',
                location: '/root/.openclaw/bots/themis/config.json',
                timestamp: '2026-02-28T00:40:00Z',
                agent: 'System',
                actionRequired: 'Obtain new token from @BotFather',
                status: 'open'
            },
            {
                id: 2,
                type: 'critical',
                title: 'SearXNG - Missing Installation',
                description: 'Service fails with exit code 203. Executable not found.',
                location: '/etc/systemd/system/searxng.service',
                timestamp: '2026-02-28T00:35:00Z',
                agent: 'System',
                actionRequired: 'Reinstall SearXNG or disable service',
                status: 'open'
            },
            {
                id: 3,
                type: 'warning',
                title: 'Deprecated datetime.utcnow()',
                description: 'Scripts using deprecated method will break in future Python versions.',
                location: 'Multiple files',
                timestamp: '2026-02-28T00:30:00Z',
                agent: 'System',
                actionRequired: 'Update to datetime.now(datetime.timezone.utc)',
                status: 'resolved'
            },
            {
                id: 4,
                type: 'info',
                title: 'Beelancer Active Bidding',
                description: '10 pending bids, 3 active gigs. Sterling is managing portfolio.',
                location: 'Beelancer',
                timestamp: '2026-02-28T00:20:00Z',
                agent: 'Sterling',
                actionRequired: null,
                status: 'open'
            },
            {
                id: 5,
                type: 'info',
                title: 'Daily Backup Completed',
                description: 'Automated GitHub backup completed successfully.',
                location: 'GitHub',
                timestamp: '2026-02-28T00:00:00Z',
                agent: 'Chronos',
                actionRequired: null,
                status: 'resolved'
            },
            {
                id: 6,
                type: 'warning',
                title: 'High Token Usage',
                description: 'GLM-5 Key #1 at 62% capacity. Consider rate limiting.',
                location: 'API Keys',
                timestamp: '2026-02-27T23:00:00Z',
                agent: 'Athena',
                actionRequired: 'Monitor usage patterns',
                status: 'open'
            }
        ];

        function getAlertIcon(type) {
            const icons = {
                critical: '🔴',
                warning: '🟡',
                info: '🔵',
                success: '✅'
            };
            return icons[type] || '⚪';
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            return date.toLocaleDateString();
        }

        function renderAlerts() {
            const activeAlerts = alerts.filter(a => a.status === 'open' && a.type !== 'info');
            const actionItems = alerts.filter(a => a.actionRequired && a.status === 'open');
            const resolvedAlerts = alerts.filter(a => a.status === 'resolved').slice(0, 3);
            
            // Update counts
            document.getElementById('criticalCount').textContent = alerts.filter(a => a.type === 'critical' && a.status === 'open').length;
            document.getElementById('warningCount').textContent = alerts.filter(a => a.type === 'warning' && a.status === 'open').length;
            document.getElementById('infoCount').textContent = alerts.filter(a => a.type === 'info' && a.status === 'open').length;
            document.getElementById('resolvedCount').textContent = alerts.filter(a => a.status === 'resolved').length;
            
            document.getElementById('activeCount').textContent = activeAlerts.length;
            document.getElementById('actionCount').textContent = actionItems.length;
            document.getElementById('resolvedRecentCount').textContent = resolvedAlerts.length;

            // Render active alerts
            const activeContainer = document.getElementById('activeAlerts');
            if (activeAlerts.length === 0) {
                activeContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎉</div><p>No active alerts</p></div>';
            } else {
                activeContainer.innerHTML = activeAlerts.map(alert => `
                    <div class="alert-card ${alert.type}">
                        <div class="alert-header">
                            <div class="alert-title">
                                ${getAlertIcon(alert.type)} ${alert.title}
                            </div>
                            <span class="alert-badge ${alert.type}">${alert.type}</span>
                        </div>
                        <p class="alert-description">${alert.description}</p>
                        <div class="alert-meta">
                            <span class="alert-time">${formatTime(alert.timestamp)} • ${alert.agent}</span>
                            <div class="alert-actions">
                                <button class="btn btn-sm btn-success" onclick="resolveAlert(${alert.id})">✓ Resolve</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Render action items
            const actionContainer = document.getElementById('actionItems');
            if (actionItems.length === 0) {
                actionContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✨</div><p>No action items</p></div>';
            } else {
                actionContainer.innerHTML = actionItems.map(alert => `
                    <div class="alert-card ${alert.type}">
                        <div class="alert-header">
                            <div class="alert-title">
                                ${getAlertIcon(alert.type)} ${alert.title}
                            </div>
                        </div>
                        <p class="alert-description">${alert.description}</p>
                        <p class="alert-description" style="color: var(--warning);">
                            <strong>⚡ Action:</strong> ${alert.actionRequired}
                        </p>
                        <div class="alert-meta">
                            <span class="alert-time">${formatTime(alert.timestamp)}</span>
                        </div>
                    </div>
                `).join('');
            }

            // Render resolved alerts
            const resolvedContainer = document.getElementById('resolvedAlerts');
            if (resolvedAlerts.length === 0) {
                resolvedContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><p>No recent resolutions</p></div>';
            } else {
                resolvedContainer.innerHTML = resolvedAlerts.map(alert => `
                    <div class="alert-card success">
                        <div class="alert-header">
                            <div class="alert-title">
                                ✅ ${alert.title}
                            </div>
                            <span class="alert-badge resolved">Resolved</span>
                        </div>
                        <p class="alert-description">${alert.description}</p>
                        <div class="alert-meta">
                            <span class="alert-time">${formatTime(alert.timestamp)}</span>
                        </div>
                    </div>
                `).join('');
            }

            // Render timeline
            const timelineContainer = document.getElementById('timeline');
            const timelineItems = [...alerts].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 8);
            timelineContainer.innerHTML = timelineItems.map(item => `
                <div class="timeline-item">
                    <div class="timeline-icon">${getAlertIcon(item.type)}</div>
                    <div class="timeline-content">
                        <div class="timeline-title">${item.title}</div>
                        <div class="timeline-time">${formatTime(item.timestamp)} • ${item.agent}</div>
                    </div>
                </div>
            `).join('');
        }

        function resolveAlert(id) {
            const alert = alerts.find(a => a.id === id);
            if (alert) {
                alert.status = 'resolved';
                alert.timestamp = new Date().toISOString();
                renderAlerts();
            }
        }

        function refreshAlerts() {
            document.getElementById('lastRefresh').textContent = 'Refreshing...';
            setTimeout(() => {
                document.getElementById('lastRefresh').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
            }, 500);
        }

        function showAddAlert() {
            alert('Add alert functionality - would open a modal in production');
        }

        // Auto-refresh every 30 seconds
        setInterval(refreshAlerts, 30000);
        
        // Initial render
        renderAlerts();
        document.getElementById('lastRefresh').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
    </script>
</body>
</html>
